<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConcernTracker | Liquid Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-color: #e0e5ec;
            --neu-shadow-dark: #a3b1c6;
            --neu-shadow-light: #ffffff;
        }
        body {
            background: linear-gradient(45deg, #e0e5ec 0%, #cbd5e0 100%);
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
        }
        /* Neumorphic Shadow Base */
        .neu-flat {
            background: var(--bg-color);
            box-shadow: 9px 9px 16px var(--neu-shadow-dark), -9px -9px 16px var(--neu-shadow-light);
        }
        .neu-inset {
            background: var(--bg-color);
            box-shadow: inset 6px 6px 12px var(--neu-shadow-dark), inset -6px -6px 12px var(--neu-shadow-light);
        }
        /* Liquidmorphism / Glass */
        .liquid-card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 24px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
        }
        .liquid-nav {
            background: rgba(59, 130, 246, 0.2);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body class="text-gray-700">
    <nav class="liquid-nav sticky top-0 z-50 p-4">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black tracking-tighter text-blue-700">CONCERN<span class="text-gray-600">FLOW</span></h1>
            <div class="flex gap-4">
                <a href="{{ url_for('index') }}" class="neu-flat px-6 py-2 rounded-full text-sm font-bold transition-all hover:scale-105 active:neu-inset">Submit</a>
                <a href="{{ url_for('admin_dashboard') }}" class="neu-flat px-6 py-2 rounded-full text-sm font-bold text-blue-600 transition-all hover:scale-105 active:neu-inset">Dashboard</a>
            </div>
        </div>
    </nav>
    <div class="container mx-auto p-8">
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="liquid-card bg-green-400/20 text-green-800 p-4 mb-6 border-l-8 border-green-500 rounded-xl font-bold italic">
                {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}
        {% block content %}{% endblock %}
    </div>
</body>
</html>
